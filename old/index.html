<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UW Time Schedule - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        th { position: sticky; top: 0; background-color: #f8fafc; z-index: 10; }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] summary ~ * { animation: slideDown 0.2s ease-in-out; }
        @keyframes slideDown { 0% { opacity: 0; transform: translateY(-5px); } 100% { opacity: 1; transform: translateY(0); } }
        #loading-overlay { backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-200 text-slate-800 font-sans h-screen flex overflow-hidden">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="absolute inset-0 z-50 bg-white/80 flex flex-col items-center justify-center">
        <i data-lucide="loader-2" class="w-12 h-12 text-purple-600 animate-spin mb-4"></i>
        <h2 id="loading-text" class="text-xl font-bold text-slate-800">Connecting to Database...</h2>
        <p class="text-sm text-slate-500 mt-2">Setting up HTTP Range Requests (No large downloads!)</p>
    </div>

    <!-- LEFT SIDEBAR: CONTROL PANEL -->
    <aside class="w-80 bg-white border-r border-slate-300 flex flex-col h-full shadow-lg z-20 shrink-0">
        <div class="p-5 border-b border-slate-200 bg-slate-50 flex items-center gap-3">
            <div class="bg-purple-700 text-white p-2 rounded flex items-center justify-center">
                <i data-lucide="library" class="w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-tight text-slate-900 uppercase">UW Time Schedule</h1>
                <p class="text-[11px] text-slate-500 font-bold uppercase tracking-wider">Advanced Search</p>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-6">
            
            <!-- Category: Department & Course -->
            <div>
                <h2 class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-3">Department & Course</h2>
                <div class="space-y-4">
                    
                    <!-- Searchable Majors List -->
                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <label class="text-xs font-semibold text-slate-700">Majors / Departments</label>
                            <button id="clear-majors" class="text-[10px] text-purple-600 hover:underline">Clear</button>
                        </div>
                        <div class="relative mb-2">
                            <input type="text" id="major-search" placeholder="Filter majors..." class="w-full text-xs border border-slate-300 rounded p-1.5 pl-7 focus:ring-2 focus:ring-purple-500 outline-none">
                            <i data-lucide="search" class="w-3.5 h-3.5 text-slate-400 absolute left-2 top-2"></i>
                        </div>
                        <!-- Injected by UI.js -->
                        <div id="major-list" class="max-h-36 overflow-y-auto space-y-1 text-xs text-slate-700 border border-slate-200 p-1.5 rounded bg-slate-50 shadow-inner">
                            <label class="flex items-center justify-center text-slate-400 italic py-2">Loading majors...</label>
                        </div>
                    </div>

                    <!-- Course Level -->
                    <div>
                        <label class="text-xs font-semibold text-slate-700 mb-1 block">Course Level</label>
                        <div class="grid grid-cols-5 gap-1" id="level-filters">
                            <button data-val="100" class="py-1 text-[11px] border border-slate-300 rounded hover:bg-slate-50 font-medium filter-btn">100</button>
                            <button data-val="200" class="py-1 text-[11px] border border-slate-300 rounded hover:bg-slate-50 font-medium filter-btn">200</button>
                            <button data-val="300" class="py-1 text-[11px] border border-slate-300 rounded hover:bg-slate-50 font-medium filter-btn">300</button>
                            <button data-val="400" class="py-1 text-[11px] border border-slate-300 rounded hover:bg-slate-50 font-medium filter-btn">400</button>
                            <button data-val="500" class="py-1 text-[11px] border border-slate-300 rounded hover:bg-slate-50 font-medium filter-btn">500+</button>
                        </div>
                    </div>

                    <!-- Credits -->
                    <div class="flex gap-2">
                        <div class="flex-1">
                            <label class="text-[10px] font-semibold text-slate-500 uppercase">Min Credits</label>
                            <input type="number" id="cred-min" placeholder="0" class="w-full text-xs border border-slate-300 rounded p-1.5 outline-none focus:ring-1 focus:ring-purple-500 filter-input">
                        </div>
                        <div class="flex-1">
                            <label class="text-[10px] font-semibold text-slate-500 uppercase">Max Credits</label>
                            <input type="number" id="cred-max" placeholder="30" class="w-full text-xs border border-slate-300 rounded p-1.5 outline-none focus:ring-1 focus:ring-purple-500 filter-input">
                        </div>
                    </div>
                </div>
            </div>

            <hr class="border-slate-200">

            <!-- Category: Schedule & Time -->
            <div>
                <h2 class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-3">Schedule & Time</h2>
                
                <div class="space-y-4">
                    <div class="bg-indigo-50 border border-indigo-100 p-2 rounded flex justify-between items-center">
                        <label class="text-[10px] font-bold text-indigo-800 uppercase tracking-wide">Apply Time Limits To:</label>
                        <select id="time-scope" class="text-[10px] border border-indigo-200 rounded p-1 outline-none bg-white font-bold text-indigo-700 shadow-sm cursor-pointer filter-input">
                            <option value="primary">Primary Sections Only</option>
                            <option value="all">All Sections</option>
                        </select>
                    </div>

                    <!-- Days -->
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-xs font-semibold text-slate-700">Meeting Days</label>
                            <div class="flex bg-slate-100 rounded p-0.5 border border-slate-200" id="day-mode-toggles">
                                <button data-mode="include" class="text-[10px] px-2 py-0.5 bg-white shadow-sm rounded font-bold text-slate-700 active-mode">Include</button>
                                <button data-mode="exclude" class="text-[10px] px-2 py-0.5 text-slate-500 font-medium hover:text-slate-700">Exclude</button>
                            </div>
                        </div>
                        <div class="flex gap-1" id="day-filters">
                            <button data-val="M" class="flex-1 py-1 text-xs border border-slate-300 rounded hover:bg-slate-50 font-medium filter-btn">M</button>
                            <button data-val="T" class="flex-1 py-1 text-xs border border-slate-300 rounded hover:bg-slate-50 font-medium filter-btn">T</button>
                            <button data-val="W" class="flex-1 py-1 text-xs border border-slate-300 rounded hover:bg-slate-50 font-medium filter-btn">W</button>
                            <button data-val="Th" class="flex-1 py-1 text-xs border border-slate-300 rounded hover:bg-slate-50 font-medium filter-btn">Th</button>
                            <button data-val="F" class="flex-1 py-1 text-xs border border-slate-300 rounded hover:bg-slate-50 font-medium filter-btn">F</button>
                        </div>
                    </div>

                    <!-- Time Bounds -->
                    <div class="flex gap-2">
                        <div class="flex-1">
                            <label class="text-[10px] font-semibold text-slate-500 uppercase">Starts After</label>
                            <input type="time" id="time-start" class="w-full text-xs border border-slate-300 rounded p-1.5 outline-none focus:ring-1 focus:ring-purple-500 filter-input">
                        </div>
                        <div class="flex-1">
                            <label class="text-[10px] font-semibold text-slate-500 uppercase">Ends Before</label>
                            <input type="time" id="time-end" class="w-full text-xs border border-slate-300 rounded p-1.5 outline-none focus:ring-1 focus:ring-purple-500 filter-input">
                        </div>
                    </div>
                </div>
            </div>

            <hr class="border-slate-200">

            <!-- Category: Section Types -->
            <div>
                <h2 class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-3">Section Types</h2>
                <div class="grid grid-cols-2 gap-y-2 gap-x-1 text-xs text-slate-700" id="type-filters">
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-50 p-1 -ml-1 rounded"><input type="checkbox" value="LC" class="accent-purple-600 type-checkbox"> Lecture (LC)</label>
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-50 p-1 -ml-1 rounded"><input type="checkbox" value="QZ" class="accent-purple-600 type-checkbox"> Quiz (QZ)</label>
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-50 p-1 -ml-1 rounded"><input type="checkbox" value="LB" class="accent-purple-600 type-checkbox"> Lab (LB)</label>
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-50 p-1 -ml-1 rounded"><input type="checkbox" value="SM" class="accent-purple-600 type-checkbox"> Seminar (SM)</label>
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-50 p-1 -ml-1 rounded"><input type="checkbox" value="ST" class="accent-purple-600 type-checkbox"> Studio (ST)</label>
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-50 p-1 -ml-1 rounded"><input type="checkbox" value="PR" class="accent-purple-600 type-checkbox"> Practicum (PR)</label>
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-50 p-1 -ml-1 rounded"><input type="checkbox" value="CL" class="accent-purple-600 type-checkbox"> Clinic (CL)</label>
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-50 p-1 -ml-1 rounded"><input type="checkbox" value="CK" class="accent-purple-600 type-checkbox"> Clerkship (CK)</label>
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-50 p-1 -ml-1 rounded"><input type="checkbox" value="CO" class="accent-purple-600 type-checkbox"> Conference (CO)</label>
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-50 p-1 -ml-1 rounded"><input type="checkbox" value="IS" class="accent-purple-600 type-checkbox"> Ind. Study (IS)</label>
                </div>
            </div>

            <hr class="border-slate-200">

            <!-- Category: Attributes & Grading -->
            <div>
                <h2 class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-3">Attributes & Grading</h2>
                <div class="flex flex-wrap gap-2 mb-4" id="attr-filters">
                    <button data-val="restr" class="filter-chip px-2 py-1 text-[10px] uppercase tracking-wide border border-slate-300 rounded-full hover:bg-slate-100 font-bold text-slate-600 bg-white shadow-sm" title="Has Registration Restrictions">Restricted</button>
                    <button data-val="addCode" class="filter-chip px-2 py-1 text-[10px] uppercase tracking-wide border border-slate-300 rounded-full hover:bg-slate-100 font-bold text-slate-600 bg-white shadow-sm" title="Add Code Required">Add Code (&gt;)</button>
                    <button data-val="crnc" class="filter-chip px-2 py-1 text-[10px] uppercase tracking-wide border border-slate-300 rounded-full hover:bg-slate-100 font-bold text-slate-600 bg-white shadow-sm" title="Credit / No Credit Only">CR/NC Only</button>
                    <button data-val="noFee" class="filter-chip px-2 py-1 text-[10px] uppercase tracking-wide border border-slate-300 rounded-full hover:bg-slate-100 font-bold text-slate-600 bg-white shadow-sm">No Extra Fees</button>
                    <button data-val="noFinAid" class="filter-chip px-2 py-1 text-[10px] uppercase tracking-wide border border-slate-300 rounded-full hover:bg-slate-100 font-bold text-slate-600 bg-white shadow-sm" title="Not eligible for Financial Aid">No FinAid (#)</button>

                    <button data-val="W" class="filter-chip px-2 py-1 text-[10px] uppercase tracking-wide border border-slate-300 rounded-full hover:bg-slate-100 font-bold text-slate-600 bg-white shadow-sm">Writing (W)</button>
                    <button data-val="H" class="filter-chip px-2 py-1 text-[10px] uppercase tracking-wide border border-slate-300 rounded-full hover:bg-slate-100 font-bold text-slate-600 bg-white shadow-sm">Honors (H)</button>
                    <button data-val="J" class="filter-chip px-2 py-1 text-[10px] uppercase tracking-wide border border-slate-300 rounded-full hover:bg-slate-100 font-bold text-slate-600 bg-white shadow-sm">Jointly Offered (J)</button>
                    <button data-val="pct" class="filter-chip px-2 py-1 text-[10px] uppercase tracking-wide border border-slate-300 rounded-full hover:bg-slate-100 font-bold text-slate-600 bg-white shadow-sm">New Course (%)</button>

                    <button data-val="O" class="filter-chip px-2 py-1 text-[10px] uppercase tracking-wide border border-slate-300 rounded-full hover:bg-slate-100 font-bold text-slate-600 bg-white shadow-sm">Online (O)</button>
                    <button data-val="A" class="filter-chip px-2 py-1 text-[10px] uppercase tracking-wide border border-slate-300 rounded-full hover:bg-slate-100 font-bold text-slate-600 bg-white shadow-sm">Async (A)</button>
                    <button data-val="B" class="filter-chip px-2 py-1 text-[10px] uppercase tracking-wide border border-slate-300 rounded-full hover:bg-slate-100 font-bold text-slate-600 bg-white shadow-sm">Hybrid (B)</button>
                    <button data-val="E" class="filter-chip px-2 py-1 text-[10px] uppercase tracking-wide border border-slate-300 rounded-full hover:bg-slate-100 font-bold text-slate-600 bg-white shadow-sm">Community (E)</button>
                    <button data-val="S" class="filter-chip px-2 py-1 text-[10px] uppercase tracking-wide border border-slate-300 rounded-full hover:bg-slate-100 font-bold text-slate-600 bg-white shadow-sm">Service (S)</button>
                    <button data-val="R" class="filter-chip px-2 py-1 text-[10px] uppercase tracking-wide border border-slate-300 rounded-full hover:bg-slate-100 font-bold text-slate-600 bg-white shadow-sm">Research (R)</button>
                </div>
            </div>

        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 flex flex-col min-w-0 bg-slate-100">
        
        <!-- Top Bar (Search & Controls) -->
        <header class="bg-white border-b border-slate-300 shadow-sm z-10 shrink-0">
            <div class="p-4 flex flex-col gap-3 max-w-6xl mx-auto w-full">
                
                <!-- Unified Search Box -->
                <div class="flex gap-2 w-full">
                    <div class="relative flex-1">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="search" class="text-slate-400 w-5 h-5"></i>
                        </div>
                        <input 
                            type="text" 
                            id="omni-search"
                            placeholder="Search prefix, number, title, instructor, building, or SLN..." 
                            class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-300 rounded-lg shadow-inner text-sm focus:bg-white focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all filter-input"
                        >
                    </div>
                    <!-- Smart Search Button -->
                    <button 
                        id="search-btn" 
                        class="px-5 py-2.5 rounded-lg text-sm font-bold transition-all bg-slate-300 text-slate-500 cursor-not-allowed shrink-0" 
                        disabled
                    >
                        Search
                    </button>
                </div>

                <!-- Sort & Controls Row -->
                <div class="flex items-center justify-between">
                    <div class="text-sm text-slate-500">
                        <span id="result-count" class="font-extrabold text-slate-800">0</span> courses found
                    </div>
                    
                    <div class="flex items-center gap-3">
                        <div class="flex gap-2 mr-2">
                            <button id="btn-expand-all" class="text-[11px] font-bold text-purple-700 hover:bg-purple-50 border border-transparent hover:border-purple-200 px-2 py-1 rounded transition-colors">Expand All</button>
                            <button id="btn-collapse-all" class="text-[11px] font-bold text-slate-500 hover:bg-slate-200 border border-transparent hover:border-slate-300 px-2 py-1 rounded transition-colors">Collapse All</button>
                        </div>
                        
                        <select id="sort-select" class="text-xs border border-slate-300 rounded p-1.5 outline-none bg-white font-bold text-slate-700 cursor-pointer shadow-sm filter-input">
                            <option value="az">Sort: Course (A-Z)</option>
                            <option value="za">Sort: Course (Z-A)</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <!-- Results Scroll Area -->
        <div class="flex-1 overflow-y-auto p-4 md:p-6 relative">
            <div id="results-container" class="max-w-6xl mx-auto space-y-4">
                <!-- Courses injected here via JS -->
            </div>
        </div>
    </main>

    <!-- Modular JS Logic -->
    <script type="module" src="js/app.js"></script>

</body>
</html>
