name: Auto-Update & Deploy

on:
  schedule:
    - cron: '0 0 1 */2 *'
  
  workflow_dispatch:
    inputs:
      skip_update:
        description: 'Deploy Pages Only (Skip Database Update)'
        type: boolean
        default: false

permissions:
  contents: write 
  pages: write    
  id-token: write 

jobs:
  update-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # --- PYTHON UPDATE BLOCK ---
      # These steps only run if we ARE NOT skipping the update
      - name: Install uv
        if: ${{ !inputs.skip_update }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
            
      - name: Install dependencies
        if: ${{ !inputs.skip_update }}
        run: uv sync --no-dev

      - name: Run update pipeline
        if: ${{ !inputs.skip_update }}
        run: uv run update.py

      - name: Commit and push changes
        id: git_check
        if: ${{ !inputs.skip_update }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/
          
          if git diff --staged --quiet; then
            echo "No changes detected. Skipping commit."
            echo "pushed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Action: automated schedule database update"
            git push
            echo "Changes successfully committed and pushed."
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      # --- DEPLOYMENT BLOCK ---
      # These steps only run if we manually clicked "Deploy Pages Only" 
      # OR if the git_check step above successfully pushed new data
      
      - name: Setup Pages
        if: ${{ inputs.skip_update == true || steps.git_check.outputs.pushed == 'true' }}
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: ${{ inputs.skip_update == true || steps.git_check.outputs.pushed == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        if: ${{ inputs.skip_update == true || steps.git_check.outputs.pushed == 'true' }}
        uses: actions/deploy-pages@v5