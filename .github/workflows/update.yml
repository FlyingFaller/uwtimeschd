name: Auto-Update Schedule Database

on:
    schedule:
        # Runs at 00:00 on the 1st of every 2nd month (Jan, Mar, May, Jul, Sep, Nov)
        - cron: '0 0 1 */2 *'
  
    # Allows manual triggering from the GitHub Actions tab
    workflow_dispatch: 

permissions:
    contents: write

jobs:
    update-database:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v8
              with:
                enable-cache: true
            
            - name: Install dependencies
              run: uv sync --no-dev

            - name: Run update pipeline
              run: uv run update.py

            - name: Commit and push changes if any
              run: |
                git config user.name 'github-actions[bot]'
                git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
                git add data/
                
                if git diff --staged --quiet; then
                    echo "No changes detected. Skipping commit."
                else
                    git commit -m "Action: automated schedule database update"
                    git push
                    echo "Changes successfully committed and pushed."
                fi